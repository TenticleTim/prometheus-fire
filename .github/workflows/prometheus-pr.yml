##
## Prometheus Governance — Pull Request Review
## by Holley Studios
##
## Runs on every PR open/update/reopen against main.
## Posts inline findings as GitHub review comments and blocks merge on BLOCKER violations.
##
## Required permissions (set at job level below — no repo-wide change needed):
##   contents:      read   — checkout the code
##   pull-requests: write  — post review comments and summary
##
## Setup:
##   1. Copy this file to your project's .github/workflows/
##   2. Commit. That's it — no tokens, no secrets, no extra config required.
##
## Optional config:
##   - fail-on-severity: change to HIGH, MEDIUM, or "none" for report-only mode
##   - See actions/pr-review/action.yml for all inputs
##

name: Prometheus Governance PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  governance:
    name: Governance Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for accurate diff detection
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prometheus scan
        run: npx prometheus scan
        continue-on-error: true  # Scan creates report.json; failures are non-fatal

      - name: Prometheus PR Review
        uses: TenticleTim/prometheus-helper/actions/pr-review@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-severity: BLOCKER  # Change to HIGH, MEDIUM, or "none" as needed
          post-inline-comments: 'true'
          update-summary: 'true'
