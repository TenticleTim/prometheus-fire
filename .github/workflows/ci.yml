name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for GitHub Actions runner (suppresses Node 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Typecheck / Test / Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          # Use root lockfile — this is an npm workspaces monorepo
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (core)
        working-directory: thesmos
        run: npm run typecheck

      - name: Typecheck (vscode extension)
        working-directory: extensions/vscode
        run: npm run typecheck

      - name: Build
        working-directory: thesmos
        run: npm run build

      - name: Typecheck (pr-review action)
        working-directory: actions/pr-review
        run: npm run typecheck

      - name: Test
        working-directory: thesmos
        run: npm test

      - name: Build (vscode extension)
        working-directory: extensions/vscode
        run: npm run build

      - name: Test (pr-review action)
        working-directory: actions/pr-review
        run: npm test

      - name: Build (pr-review action)
        working-directory: actions/pr-review
        run: npm run build

      - name: Governance SARIF scan
        if: matrix.node-version == '22.x'
        working-directory: thesmos
        run: node dist/bin/cli.js validate --sarif > ../governance.sarif 2>/dev/null || true

      - name: Upload SARIF to GitHub Security tab
        if: matrix.node-version == '22.x'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: governance.sarif
          category: thesmos-governance
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22.x'
        uses: codecov/codecov-action@v7
        with:
          directory: thesmos/coverage/
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload coverage artifact
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: thesmos/coverage/
          retention-days: 7

  # Status-check aggregator: branch ruleset requires a check named "typecheck".
  # This job runs only after all matrix legs of `ci` pass, creating exactly
  # that context so the ruleset is satisfied on every PR.
  typecheck:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - run: echo "All CI checks passed"
